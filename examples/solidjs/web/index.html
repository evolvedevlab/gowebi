<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{- if .Meta.title -}}
        <title>{{.Meta.title}}</title>
    {{- end -}}
    {{- if .Meta.description -}}
        <meta name="description" content="{{.Meta.description}}"></meta>
    {{- end -}}

    {{.Head}}
  </head>
  <body>
    <div id="app">{{.App}}</div>

    {{if not .NoHydrate}}
        <script type="module" src="{{.HydrationScriptSrc}}"></script>
    {{end}}
  </body>
</html>
